spring.application.name=doyouknowju

# Server port
# server.port=8888

# Settings

# Context path
server.servlet.context-path=/dykj

# Multipart upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# MyBatis settings
# Datasource
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=DYKJ
spring.datasource.password=DYKJ

# MyBatis settings
mybatis.configuration.jdbc-type-for-null=NULL

mybatis.type-aliases-package=com.project.dykj.board.model.vo,com.project.dykj.kis.model.vo,com.project.dykj.domain.stock.dto

# Mapper XML locations
mybatis.mapper-locations=classpath:/mappers/*.xml

# map-underscore-to-camel-case
mybatis.configuration.map-underscore-to-camel-case=true

# JWT 관련 설정
# JWT 토큰 서명에 사용할 비밀 키(최소 32바이트) (실제 운영환경에서는 더 복잡하고 안전한 키 사용)
jwt.secret=faddfadfdfas.bebebberasdfsa.basosspodkdvvfdbaafbdwe3t3t2

# JWT expiration (ms)
jwt.expiration=864000000


# Logging settings
# Root log level
logging.level.root=info

# Package log levels
logging.level.com.kh.spring.aop=debug
logging.level.com.kh.spring.board=debug
logging.level.com.kh.spring.member=debug

# Rankings source: mock | kis
