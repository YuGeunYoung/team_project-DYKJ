spring.application.name=doyouknowju

# Server port
server.port=8080

# Settings

# Context path
server.servlet.context-path=/dykj

# Multipart upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (for Summernote image upload)
app.upload.dir=${user.home}/dykj-uploads

# MyBatis settings
# Datasource
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=DYKJ
spring.datasource.password=DYKJ

# MyBatis settings
mybatis.configuration.jdbc-type-for-null=NULL
# Dong: type-aliases-package에 stock VO 패키지 추가
# Dong: type-aliases-package에 ranking DTO 패키지 추가
mybatis.type-aliases-package=com.project.dykj.domain.board.model.vo,com.project.dykj.kis.model.vo,com.project.dykj.domain.stock.dto,com.project.dykj.domain.stock.vo,com.project.dykj.domain.member.entity,com.project.dykj.domain.game.entity,com.project.dykj.domain.ranking.dto,com.project.dykj.domain.game.dto

# Mapper XML locations
mybatis.mapper-locations=classpath:/mappers/*.xml

# map-underscore-to-camel-case
mybatis.configuration.map-underscore-to-camel-case=true

# JWT 시크릿 키
# JWT 토큰 서명에 사용하는 비밀키 (운영 환경에서는 32자 이상 권장)
jwt.secret=faddfadfdfas.bebebberasdfsa.basosspodkdvvfdbaafbdwe3t3t2

# JWT expiration (ms)
jwt.expiration=864000000


# Logging settings
# Root log level
logging.level.root=info

# Package log levels
logging.level.com.kh.spring.aop=debug
logging.level.com.kh.spring.board=debug
logging.level.com.kh.spring.member=debug

# Rankings source: mock | kis
ranking.source=kis

# KIS API (set these for real rankings)
